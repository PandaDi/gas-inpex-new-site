version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gasinpex}
      POSTGRES_USER: ${DB_USER:-gasinpex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?error_set_DB_PASSWORD_in_env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gasinpex} -d ${DB_NAME:-gasinpex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    env_file:
      - .env
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://gas-inpex.kz/api}
    depends_on:
      - backend

  nginx:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/sites:/etc/nginx/conf.d:ro
      - backend_media:/app/media:ro
      - backend_static:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  backend_media:
  backend_static: